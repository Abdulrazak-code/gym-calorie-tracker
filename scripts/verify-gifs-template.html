<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise GIF Verification</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #09090b; color: #fafafa; font-family: system-ui, sans-serif; padding: 20px; }
        h1 { text-align: center; margin-bottom: 8px; font-size: 28px; }
        .subtitle { text-align: center; color: #6b7280; margin-bottom: 24px; font-size: 14px; }
        .controls { text-align: center; margin-bottom: 24px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .controls input { background: #16161a; border: 1px solid #27272a; color: #fff; padding: 10px 14px; border-radius: 8px; width: 280px; font-size: 14px; }
        .controls button { background: #10b981; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .controls button:hover { opacity: 0.85; }
        .controls button.danger { background: #ef4444; }
        .controls button.warning { background: #f59e0b; color: #000; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: #111114; border-radius: 16px; overflow: hidden; border: 2px solid #27272a; transition: all 0.2s; }
        .card:hover { border-color: #3f3f46; }
        .card.wrong { border-color: #ef4444; background: #1a0a0a; }
        .card.mismatch { border-color: #f59e0b; background: #1a150a; }
        .card img { width: 100%; height: 240px; object-fit: contain; background: #ffffff; display: block; }
        .card-info { padding: 16px; }
        .card-key { font-size: 11px; color: #6b7280; font-family: monospace; }
        .card-name { font-size: 16px; font-weight: 700; margin-top: 6px; }
        .card-focus { font-size: 13px; color: #10b981; margin-top: 6px; }
        .card-equip { font-size: 12px; color: #8b5cf6; margin-top: 4px; }
        .card-muscles { font-size: 11px; color: #a1a1aa; margin-top: 4px; }
        .card-muscles span { background: #27272a; padding: 2px 6px; border-radius: 4px; margin-right: 4px; }
        .card-actions { display: flex; gap: 8px; margin-top: 12px; }
        .card-actions button { flex: 1; padding: 10px; border: 2px solid #27272a; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 700; background: transparent; }
        .btn-ok { color: #10b981; border-color: #10b98133; }
        .btn-ok.active { background: #10b981; color: #fff; border-color: #10b981; }
        .btn-wrong { color: #ef4444; border-color: #ef444433; }
        .btn-wrong.active { background: #ef4444; color: #fff; border-color: #ef4444; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 700; margin-top: 6px; }
        .badge-mismatch { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .badge-wrong { background: rgba(239,68,68,0.15); color: #ef4444; }
        .summary { text-align: center; margin: 24px auto; padding: 16px 24px; background: #111114; border-radius: 12px; display: inline-flex; gap: 24px; }
        .summary-wrap { text-align: center; }
        .summary span { font-size: 14px; }
        .summary .count { font-weight: 700; font-size: 18px; }
        .count-ok { color: #10b981; }
        .count-wrong { color: #ef4444; }
        .count-mismatch { color: #f59e0b; }
        .keyboard-hint { text-align: center; color: #4b5563; font-size: 12px; margin-top: 20px; }
        .keyboard-hint kbd { background: #27272a; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Exercise GIF Verification</h1>
    <p class="subtitle">Review each animated GIF. Mark correct or wrong. Auto-detected mismatches are highlighted in orange.</p>
    <div class="controls">
        <input type="text" id="search" placeholder="Search by name or key..." oninput="filterCards()">
        <button onclick="showAll()">Show All</button>
        <button onclick="showWrong()" class="danger">Show Wrong</button>
        <button onclick="showMismatch()" class="warning">Auto-Mismatch</button>
        <button onclick="exportResults()">Export</button>
    </div>
    <div class="summary-wrap"><div class="summary" id="summary"></div></div>
    <div class="grid" id="grid"></div>
    <div class="keyboard-hint"><kbd>Left</kbd> Wrong &nbsp; <kbd>Right</kbd> Correct</div>

    <script>
    var exercises = <!--EXERCISES-->;
    var status = {};
    var currentIndex = 0;

    try {
        var saved = localStorage.getItem('gifStatus');
        if (saved) status = JSON.parse(saved);
    } catch(e) {}

    exercises.forEach(function(ex) {
        if (ex.autoMismatch && !status[ex.key]) {
            status[ex.key] = 'mismatch';
        }
    });

    function saveStatus() {
        try { localStorage.setItem('gifStatus', JSON.stringify(status)); } catch(e) {}
    }

    function markOk(key) {
        status[key] = 'ok';
        saveStatus();
        render(document.getElementById('search').value);
    }

    function markWrong(key) {
        status[key] = 'wrong';
        saveStatus();
        render(document.getElementById('search').value);
    }

    function render(filter, onlyWrong, onlyMismatch) {
        filter = filter || '';
        onlyWrong = onlyWrong || false;
        onlyMismatch = onlyMismatch || false;
        var grid = document.getElementById('grid');
        grid.innerHTML = '';
        var lower = filter.toLowerCase();

        exercises.forEach(function(ex, i) {
            if (filter && ex.key.indexOf(lower) === -1 && ex.name.toLowerCase().indexOf(lower) === -1) return;
            if (onlyWrong && status[ex.key] !== 'wrong') return;
            if (onlyMismatch && status[ex.key] !== 'mismatch') return;

            var st = status[ex.key] || 'ok';
            var isWrong = st === 'wrong';
            var isMismatch = st === 'mismatch' && !isWrong;
            var card = document.createElement('div');
            card.className = 'card';
            if (isWrong) card.className += ' wrong';
            else if (isMismatch) card.className += ' mismatch';

            var img = document.createElement('img');
            img.src = '../mobile-app/assets/exercise-gifs/' + ex.gifPath;
            img.alt = ex.name;
            img.onerror = function() { this.src = 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🖼️</text></svg>'; };
            card.appendChild(img);

            var info = document.createElement('div');
            info.className = 'card-info';

            var musclesHtml = '';
            if (ex.targetMuscles && ex.targetMuscles.primary && ex.targetMuscles.primary.length) {
                musclesHtml += 'Primary: ';
                ex.targetMuscles.primary.forEach(function(m) { musclesHtml += '<span>' + m + '</span>'; });
            }
            if (ex.targetMuscles && ex.targetMuscles.secondary && ex.targetMuscles.secondary.length) {
                musclesHtml += ' Secondary: ';
                ex.targetMuscles.secondary.forEach(function(m) { musclesHtml += '<span>' + m + '</span>'; });
            }

            var badgeHtml = '';
            if (isMismatch) badgeHtml = '<div class="badge badge-mismatch">Auto-flagged</div>';
            if (isWrong) badgeHtml = '<div class="badge badge-wrong">Marked Wrong</div>';

            info.innerHTML = '<div class="card-key">' + ex.key + '</div>' +
                '<div class="card-name">' + ex.name + '</div>' +
                '<div class="card-focus">Focus: ' + ex.focusArea + '</div>' +
                '<div class="card-equip">Equipment: ' + ex.equipment + '</div>' +
                '<div class="card-muscles">' + musclesHtml + '</div>' +
                badgeHtml;

            var actions = document.createElement('div');
            actions.className = 'card-actions';

            var okBtn = document.createElement('button');
            okBtn.className = 'btn-ok';
            if (!isWrong) okBtn.className += ' active';
            okBtn.textContent = 'Correct';
            okBtn.setAttribute('data-key', ex.key);
            okBtn.addEventListener('click', function() { markOk(this.getAttribute('data-key')); });

            var wrongBtn = document.createElement('button');
            wrongBtn.className = 'btn-wrong';
            if (isWrong) wrongBtn.className += ' active';
            wrongBtn.textContent = 'Wrong';
            wrongBtn.setAttribute('data-key', ex.key);
            wrongBtn.addEventListener('click', function() { markWrong(this.getAttribute('data-key')); });

            actions.appendChild(okBtn);
            actions.appendChild(wrongBtn);
            info.appendChild(actions);
            card.appendChild(info);
            grid.appendChild(card);
        });

        updateSummary();
    }

    function updateSummary() {
        var wrongCount = 0, mismatchCount = 0;
        var keys = Object.keys(status);
        for (var i = 0; i < keys.length; i++) {
            if (status[keys[i]] === 'wrong') wrongCount++;
            if (status[keys[i]] === 'mismatch') mismatchCount++;
        }
        var okCount = exercises.length - wrongCount - mismatchCount;
        document.getElementById('summary').innerHTML =
            '<span class="count-ok"><span class="count">' + okCount + '</span> Correct</span>' +
            '<span class="count-wrong"><span class="count">' + wrongCount + '</span> Wrong</span>' +
            '<span class="count-mismatch"><span class="count">' + mismatchCount + '</span> Mismatch</span>' +
            '<span><span class="count">' + exercises.length + '</span> Total</span>';
    }

    function filterCards() { render(document.getElementById('search').value); }
    function showAll() { document.getElementById('search').value = ''; render(); }
    function showWrong() { render(document.getElementById('search').value, true); }
    function showMismatch() { render(document.getElementById('search').value, false, true); }

    function exportResults() {
        var wrongList = [];
        exercises.forEach(function(ex) {
            if (status[ex.key] === 'wrong' || status[ex.key] === 'mismatch') {
                wrongList.push({ key: ex.key, name: ex.name, focusArea: ex.focusArea, equipment: ex.equipment });
            }
        });
        var text = 'EXERCISES TO FIX (' + wrongList.length + '):\n' + JSON.stringify(wrongList, null, 2);
        navigator.clipboard.writeText(text).then(function() { alert('Copied ' + wrongList.length + ' exercises!'); });
    }

    document.addEventListener('keydown', function(e) {
        if (e.target.tagName === 'INPUT') return;
        var cards = document.querySelectorAll('.card');
        if (cards.length === 0) return;
        if (e.key === 'ArrowRight') { e.preventDefault(); markOk(cards[currentIndex].querySelector('.btn-ok').getAttribute('data-key')); currentIndex = Math.min(currentIndex + 1, cards.length - 1); }
        else if (e.key === 'ArrowLeft') { e.preventDefault(); markWrong(cards[currentIndex].querySelector('.btn-wrong').getAttribute('data-key')); currentIndex = Math.min(currentIndex + 1, cards.length - 1); }
    });

    render();
    </script>
</body>
</html>
