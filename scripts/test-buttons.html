<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test Buttons</title>
<style>
body { background: #09090b; color: #fff; font-family: sans-serif; padding: 40px; }
.card { background: #111; border: 2px solid #27272a; border-radius: 12px; padding: 20px; margin: 10px 0; max-width: 400px; }
button { padding: 10px 20px; border: 2px solid #27272a; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 700; background: transparent; margin: 5px; }
.ok { color: #10b981; }
.ok.active { background: #10b981; color: #fff; border-color: #10b981; }
.wrong { color: #ef4444; }
.wrong.active { background: #ef4444; color: #fff; border-color: #ef4444; }
</style>
</head>
<body>
<h1>Button Test</h1>
<p>If you see this, HTML loads. Click buttons below:</p>
<div class="card">
<p>Bench Press</p>
<button class="ok" id="ok1">Correct</button>
<button class="wrong" id="wrong1">Wrong</button>
<p id="result">Status: none</p>
</div>
<script>
document.getElementById('ok1').addEventListener('click', function() {
  document.getElementById('result').textContent = 'Status: CORRECT';
  this.classList.add('active');
  document.getElementById('wrong1').classList.remove('active');
});
document.getElementById('wrong1').addEventListener('click', function() {
  document.getElementById('result').textContent = 'Status: WRONG';
  this.classList.add('active');
  document.getElementById('ok1').classList.remove('active');
});
console.log('JS loaded OK');
</script>
</body>
</html>
